<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — ExpenseFlow</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="licon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      ExpenseFlow
    </div>
    <div class="auth-title">Set a new password</div>
    <div class="auth-sub">Choose a strong password for your account.</div>

    <!-- Invalid token state -->
    <div id="invalidToken" style="display:none;text-align:center;padding:24px 0">
      <div style="color:var(--red);font-size:0.9rem;margin-bottom:16px">This reset link is invalid or has expired.</div>
      <a href="forgot-password.html" class="btn btn-primary" style="justify-content:center">Request a new link</a>
    </div>

    <form id="resetForm" novalidate>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label" for="newPassword">New password</label>
        <input class="form-input" id="newPassword" name="newPassword" type="password" placeholder="••••••••" autocomplete="new-password" required>
        <div class="pw-rules" id="pwRules">
          <div class="pw-rule" id="pw-len">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            8+ characters
          </div>
          <div class="pw-rule" id="pw-upper">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            Uppercase letter
          </div>
          <div class="pw-rule" id="pw-lower">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            Lowercase letter
          </div>
          <div class="pw-rule" id="pw-num">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            Number
          </div>
          <div class="pw-rule" id="pw-sym">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            Special character
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm new password</label>
        <input class="form-input" id="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••" autocomplete="new-password" required>
      </div>

      <div id="errBox" class="err-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        <span id="errText"></span>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:18px;justify-content:center" type="submit" id="submitBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        Set new password
      </button>
    </form>

    <div class="auth-foot">
      <a href="login.html" style="color:var(--text-muted)">← Back to login</a>
    </div>
  </div>
</div>

<script type="module">
import { BASE_URL } from "./js/api.js";
import { showErr, clearErr, validatePassword, PASSWORD_RULES } from "./js/auth.js";

const btn      = document.getElementById("submitBtn");
const pwInput  = document.getElementById("newPassword");
const token    = new URLSearchParams(window.location.search).get("token");

if (!token) {
  document.getElementById("resetForm").style.display = "none";
  document.getElementById("invalidToken").style.display = "block";
}

const CHECK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
const RING_SVG  = `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>`;

pwInput.addEventListener("input", () => {
  const v = pwInput.value;
  PASSWORD_RULES.forEach(r => {
    const el = document.getElementById(r.id);
    if (!el) return;
    const ok = r.test(v);
    el.classList.toggle("ok", ok);
    el.innerHTML = (ok ? CHECK_SVG : RING_SVG) + " " + r.msg;
  });
});

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErr("errBox");

  const newPassword     = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  const errs = [
    ...validatePassword(newPassword),
    ...(newPassword !== confirmPassword ? ["Passwords do not match."] : []),
  ];
  if (errs.length) { showErr("errBox", errs); return; }

  btn.disabled = true;
  btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Saving…`;

  try {
    const res = await fetch(`${BASE_URL}/auth/password-reset-verify`, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
          token: token,               // The token string variable extracted from the URL bar
          new_password: newPassword,   // Matches your backend schema expectations
          confirm_password: confirmPassword 
      }),
    });
    const data = await res.json();
    if (res.ok) {
      sessionStorage.setItem("flash", "Password updated successfully. Please log in.");
      window.location.href = "login.html";
    } else if (res.status === 400 || res.status === 422) {
      document.getElementById("resetForm").style.display = "none";
      document.getElementById("invalidToken").style.display = "block";
    } else {
      showErr("errBox", [data.detail || "Could not reset password. Try again."]);
    }
  } catch {
    showErr("errBox", ["Could not reach the server. Check your connection."]);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> Set new password`;
  }
});
</script>
</body>
</html>
