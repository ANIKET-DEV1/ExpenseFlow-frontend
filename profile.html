<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — ExpenseFlow</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<nav class="topnav" id="topnav"></nav>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page">

      <div class="page-head">
        <div>
          <div class="page-title">Security Vault Profile</div>
          <div class="page-sub">Review secure platform session parameters and cryptographic clearance details.</div>
        </div>
      </div>

      <div id="profileContainer">
        <!-- Will be dynamically generated by js/profile.js -->
        <div class="card" style="max-width:800px; margin-bottom: 24px;">
          <div style="padding:24px">
            <div class="skel" style="width:64px;height:64px;border-radius:14px;margin-bottom:15px"></div>
            <div class="skel skel-row" style="width:40%"></div>
            <div class="skel skel-row"></div>
            <div class="skel skel-row"></div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script type="module">
import { requireAuth, renderTopnav, renderSidebar } from "./js/utils.js";
import { initProfile } from "./js/profile.js";

const user = await requireAuth();
if (!user) throw new Error("not authed");

renderTopnav(user);
renderSidebar(user);
initProfile(user);
</script>
</body>
</html>
