<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ExpenseFlow</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="licon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      ExpenseFlow
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to your account to continue</div>

    <form id="loginForm" autocomplete="on" novalidate>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" id="username" name="username" type="text" placeholder="your_username" autocomplete="username" required>
      </div>
      <div class="form-group" style="margin-bottom:4px">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div style="text-align:right;margin-top:6px">
        <a href="forgot-password.html" style="font-size:0.78rem;color:var(--green)">Forgot password?</a>
      </div>

      <div id="errBox" class="err-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        <span id="errText"></span>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:18px;justify-content:center" type="submit" id="submitBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        Log in
      </button>
    </form>

    <div class="auth-foot">
      No account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script type="module">
import { BASE_URL } from "../js/api.js";
import { showErr, clearErr, validateUsername, validatePassword } from "../js/auth.js";

const form = document.getElementById("loginForm");
const btn  = document.getElementById("submitBtn");

// If already logged in, skip to dashboard
(async () => {
  try {
    const res = await fetch(`${BASE_URL}/auth/me`, { credentials: "include" });
    const d = await res.json();
    if (res.ok && d.authenticated) window.location.href = "dashboard.html";
  } catch {}
})();

function validate(username, password) {
  const errs = [...validateUsername(username), ...validatePassword(password)];
  return errs;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErr("errBox");

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errs = validate(username, password);
  if (errs.length) { showErr("errBox", errs); return; }

  btn.disabled = true;
  btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Logging in…`;

  try {
    const res = await fetch(`${BASE_URL}/auth/login`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok) {
      sessionStorage.setItem("flash", data.message || `Welcome back, ${username}!`);
      window.location.href = "dashboard.html";
    } else {
      showErr("errBox", [data.detail || "Invalid username or password."]);
    }
  } catch {
    showErr("errBox", ["Could not reach the server. Check your connection."]);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg> Log in`;
  }
});
</script>
</body>
</html>
