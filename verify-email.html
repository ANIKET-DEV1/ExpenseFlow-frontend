<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — ExpenseFlow</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="text-align:center">
    <div class="auth-logo" style="justify-content:center;margin-bottom:32px">
      <div class="licon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      ExpenseFlow
    </div>

    <!-- Loading state -->
    <div id="stateLoading">
      <div style="color:var(--text-muted);font-size:0.9rem;margin-bottom:8px">Verifying your email…</div>
      <div class="skel" style="height:4px;width:100%;border-radius:2px;margin-top:16px"></div>
    </div>

    <!-- Success state -->
    <div id="stateSuccess" style="display:none">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--green)">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="auth-title" style="margin-bottom:6px">Email verified!</div>
      <div class="auth-sub" style="margin-bottom:24px">Your account is now active. You can log in.</div>
      <a href="login.html" class="btn btn-primary" style="justify-content:center;display:inline-flex">Go to login</a>
    </div>

    <!-- Error state -->
    <div id="stateError" style="display:none">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--red-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--red)">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
      </div>
      <div class="auth-title" style="margin-bottom:6px">Link expired</div>
      <div class="auth-sub" id="errorMsg" style="margin-bottom:24px">This verification link is invalid or has expired.</div>
      <a href="register.html" class="btn btn-primary" style="justify-content:center;display:inline-flex">Register again</a>
    </div>
  </div>
</div>

<script type="module">
import { BASE_URL } from "./js/api.js";

const token = new URLSearchParams(window.location.search).get("token");

async function verify() {
  if (!token) {
    setState("error", "No verification token found in the link.");
    return;
  }
  try {
    const res = await fetch(`${BASE_URL}/auth/verify-email?token=${encodeURIComponent(token)}`, {
      credentials: "include",
    });
    if (res.ok) {
      setState("success");
    } else {
      const d = await res.json().catch(() => ({}));
      setState("error", d.detail || "This link is invalid or has expired.");
    }
  } catch {
    setState("error", "Could not reach the server. Check your connection.");
  }
}

function setState(s, msg) {
  document.getElementById("stateLoading").style.display = "none";
  document.getElementById("stateSuccess").style.display = s === "success" ? "block" : "none";
  document.getElementById("stateError").style.display   = s === "error"   ? "block" : "none";
  if (msg) document.getElementById("errorMsg").textContent = msg;
}

verify();
</script>
</body>
</html>
