<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ExpenseFlow</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="licon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      ExpenseFlow
    </div>
    <div class="auth-title">Reset your password</div>
    <div class="auth-sub">We'll send a reset link to your email address.</div>

    <form id="forgotForm" novalidate>
      <div class="form-group" style="margin-bottom:4px">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div id="errBox" class="err-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        <span id="errText"></span>
      </div>
      <div id="successBox" class="success-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span id="successText"></span>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:18px;justify-content:center" type="submit" id="submitBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        Send reset link
      </button>
    </form>

    <div class="auth-foot">
      <a href="login.html" style="color:var(--text-muted)">← Back to login</a>
    </div>
  </div>
</div>

<script type="module">
import { BASE_URL } from "../js/api.js";
import { showErr, clearErr, validateEmail } from "../js/auth.js";

const btn = document.getElementById("submitBtn");

function showSuccess(msg) {
  const el = document.getElementById("successBox");
  document.getElementById("successText").textContent = msg;
  el.classList.add("show");
}

document.getElementById("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErr("errBox");
  document.getElementById("successBox").classList.remove("show");

  const email = document.getElementById("email").value.trim();
  const errs  = validateEmail(email);
  if (errs.length) { showErr("errBox", errs); return; }

  btn.disabled = true;
  btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Sending…`;

  try {
  const res = await fetch(`${BASE_URL}/auth/password-reset`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: email }), // Explicitly pass key-value
  });
  
  const data = await res.json();
  
  if (res.ok) {
    showSuccess(data.message || "Reset link sent successfully!");
  } else {
    // 🎯 FIX: Pass the container ID "errBox" and wrap the error message inside an array!
    showErr("errBox", [data.detail || "Could not process password reset."]);
  }
} 
  catch {
    showErr("errBox", ["Could not reach the server. Check your connection."]);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg> Send reset link`;
  }
});
</script>
</body>
</html>
